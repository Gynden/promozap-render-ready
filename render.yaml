services:
  - type: web
    name: promozap
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEBSITE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: WA_AUTH_DIR
        value: /app/packages/web/.data/wa-auth
